name: CI – ShellCheck and Bats Tests

on:
  push:
    branches: ['**']
  pull_request:
    branches: [main]

jobs:
  shellcheck:
    name: Lint with ShellCheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Install ShellCheck
        run: sudo apt-get install -y shellcheck
        
      - name: Run ShellCheck on all scripts
        # This scans your scripts for bugs before they even run
        run: find . -name '*.sh' -not -path './.git/*' -exec shellcheck {} +

  bats:
    name: Run Bats Tests
    runs-on: ubuntu-latest
    needs: shellcheck # Only run tests if the code is written correctly
    steps:
      - uses: actions/checkout@v4
      
      - name: Install Bats Core
        run: |
          git clone https://github.com/bats-core/bats-core.git /tmp/bats-core
          sudo /tmp/bats-core/install.sh /usr/local
          
      - name: Install Bats helpers
        # CRITICAL: We use 'tests/test_helper' to match your local setup
        run: |
          mkdir -p tests/test_helper
          git clone https://github.com/bats-core/bats-support.git tests/test_helper/bats-support
          git clone https://github.com/bats-core/bats-assert.git tests/test_helper/bats-assert
          
      - name: Make all scripts executable
        run: find . -name '*.sh' -exec chmod +x {} +
        
      - name: Run all Bats tests
        # We use the 'tap' formatter because it's the standard for CI logs
        run: bats tests/ --formatter tap